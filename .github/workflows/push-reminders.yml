name: Push Reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push reminder endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/push-notifications"
